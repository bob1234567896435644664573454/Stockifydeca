name: Supabase Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "supabase/config.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push DB migrations
        run: supabase db push --linked

      - name: Deploy Edge functions
        run: |
          for fn in org school class user trade symbols watchlists charts teacher-console engine-tick competition-jobs report-jobs market-data; do
            supabase functions deploy "$fn" --no-verify-jwt --project-ref "$PROJECT_REF"
          done

